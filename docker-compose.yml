services:
  finance-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chaorun
      POSTGRES_PASSWORD: chaorun_dev
      POSTGRES_DB: chaorun_finance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaorun -d chaorun_finance"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  finance-provider:
    build: .
    ports:
      - "8082:8082"
    environment:
      HTTP_ADDR: ":8082"
      DATABASE_DSN: "postgres://chaorun:chaorun_dev@finance-postgres:5432/chaorun_finance?sslmode=disable"
    depends_on:
      finance-postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
